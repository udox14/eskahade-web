name: Deploy to Cloudflare

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        # npm install (not ci) so platform-specific optional deps (@emnapi/*,
        # native bindings) resolve on Linux CI even though the lock was
        # generated on Windows.
        run: npm install --no-audit --no-fund

      - name: Apply D1 migrations
        run: npm run db:migrate:remote
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Generate Cloudflare env types
        # cloudflare-env.d.ts is gitignored (generated); regenerate it so the
        # build's TypeScript step can resolve D1Database / R2Bucket types.
        run: npm run cf-typegen

      - name: Build (OpenNext Cloudflare)
        run: npm run cf:build

      - name: Deploy to Cloudflare Workers
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy
